<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="sdvg.io — минималистичный трекер задач: эпики, спринты, проекты. Работает офлайн." />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- black-translucent: edge-to-edge в iOS PWA. Status bar становится
         прозрачным, наш dynamic theme-color (JS) управляет фоном под ним.
         safe-area-inset-top нужен для padding topbar'а чтобы контент не
         прятался под status bar. "default" — non-translucent fallback. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="sdvg.io" />
    <meta name="theme-color" content="#fbfaf6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141418" media="(prefers-color-scheme: dark)" />
    <title>sdvg.io</title>
    <script>
      // Дефолт — светлая. Системное prefers-color-scheme намеренно не используем:
      // приложение должно стартовать в одной и той же теме у всех пользователей,
      // переключение — явное действие через top-right cluster.
      try {
        var raw = localStorage.getItem("tracker-v6");
        var t = null;
        if (raw) {
          var d = JSON.parse(raw);
          if (d && d.ui && d.ui.theme) t = d.ui.theme;
        }
        document.documentElement.setAttribute("data-theme", t || "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    </script>
    <style>
      :root {
        --bg:        oklch(98.6% 0.004 80);
        --panel:     oklch(100%  0     0);
        --surface:   oklch(96.5% 0.005 80);
        --surface-2: oklch(94%   0.006 80);
        --line:      oklch(91%   0.007 80);
        --line-2:    oklch(85%   0.008 80);

        --fg:   oklch(22% 0.012 80);
        --fg-2: oklch(42% 0.012 80);
        --fg-3: oklch(56% 0.012 80);
        --fg-4: oklch(72% 0.010 80);
        --fg-5: oklch(85% 0.008 80);

        --accent:     oklch(54% 0.16 145);
        --accent-ink: oklch(99% 0    0);

        --pill-bg:     oklch(95% 0.04 270);
        --pill-border: oklch(80% 0.10 270);
        --pill-fg:     oklch(46% 0.18 270);

        --active-bg: oklch(22% 0.012 80);
        --active-fg: oklch(98.6% 0.004 80);

        --danger:      oklch(55% 0.17 25);
        --danger-soft: oklch(70% 0.09 25);

        --overlay:      rgba(28, 25, 20, 0.42);
        --menu-shadow:  0 2px 14px rgba(28, 25, 20, 0.08);
        --modal-shadow: 0 8px 32px rgba(28, 25, 20, 0.12);

        --body-weight: 400;

        /* Top padding на мобиле = clearance для floating utility cluster.
           Cluster занимает top:8 + h:48 = 56px. Ставим 70px → 14px breathing room
           между cluster'ом и первым элементом контента (FilterBar или Epics). */
        --pad: 70px 14px calc(56px + env(safe-area-inset-bottom));
        --sprint-pad: 11px 12px;
        --modal-pad: 18px 14px;
        --modal-w: 100%;

        --fast: 120ms;
        --med: 200ms;
        --slow: 280ms;
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
        /* CSS linear() spring easings. Chrome 112+, Safari 18+, Firefox 122+.
           --ease-spring — небольшой overshoot + settle, iOS-like.
           --ease-spring-soft — без overshoot, smooth decelerate.
           cubic-bezier не может передать физику пружины (overshoot/settle).
           Fallback на cubic-bezier для старых браузеров (graceful). */
        --ease-spring: linear(
          0, 0.009, 0.035 2%, 0.141, 0.281 6.6%, 0.723 13.9%,
          0.907, 1.023, 1.088, 1.117, 1.11, 1.072, 1.013,
          0.976, 0.953, 0.94, 0.935, 0.936 47.3%, 0.949 52.9%,
          0.979, 1.011, 1.029 70.1%, 1.028, 1.015, 1.002,
          0.995, 0.992, 0.994, 1 94.3%, 1.001
        );
        --ease-spring-soft: linear(
          0, 0.006, 0.025 2.6%, 0.101 6.4%, 0.539 23.4%, 0.68 29.6%,
          0.803, 0.896 40.8%, 0.96, 1.004 52.5%, 1.02, 1.03, 1.027,
          1.018 69.8%, 1.002 82.4%, 0.996
        );
      }

      [data-theme="dark"] {
        --bg:        oklch(16% 0.008 250);
        --panel:     oklch(20% 0.010 250);
        --surface:   oklch(19% 0.009 250);
        --surface-2: oklch(23% 0.011 250);
        --line:      oklch(28% 0.012 250);
        --line-2:    oklch(34% 0.013 250);

        --fg:   oklch(93% 0.006 250);
        --fg-2: oklch(72% 0.008 250);
        --fg-3: oklch(56% 0.010 250);
        --fg-4: oklch(40% 0.011 250);
        --fg-5: oklch(30% 0.012 250);

        --accent:     oklch(72% 0.16 145);
        --accent-ink: oklch(14% 0.008 250);

        --pill-bg:     oklch(22% 0.05 270);
        --pill-border: oklch(38% 0.10 270);
        --pill-fg:     oklch(78% 0.13 270);

        --active-bg: oklch(93% 0.006 250);
        --active-fg: oklch(16% 0.008 250);

        --danger:      oklch(72% 0.15 25);
        --danger-soft: oklch(48% 0.08 25);

        --overlay:      rgba(0, 0, 0, 0.62);
        --menu-shadow:  0 2px 14px rgba(0, 0, 0, 0.45);
        --modal-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);

        --body-weight: 360;
      }

      @media (min-width: 561px) {
        :root {
          --pad: 40px 24px 80px;
          --sprint-pad: 12px 16px;
          --modal-pad: 24px;
          --modal-w: 480px;
        }
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        /* Prevent случайный horizontal scroll. Негативные margin'ы у icon-btn,
           pill-row и act-btn на узком viewport'е могут выходить за правую
           границу body на 2-4px. overflow-x:clip скрывает это без создания
           scroll-контейнера (в отличие от overflow-x:hidden который ломает
           position:sticky — он нам нужен для sticky section headers). */
        overflow-x: clip;
        /* Prevent pull-to-refresh + chain-scrolling из drawer'а в body.
           'contain' сохраняет iOS-style rubber band внутри scroll-containers,
           но блокирует browser navigation gesture (PTR) на корне.
           Native-app feel: refresh не то, что юзер ожидает от trackers'а. */
        overscroll-behavior-y: contain;
      }

      body {
        font-family: "SF Mono", "Menlo", "Consolas", ui-monospace, monospace;
        font-weight: var(--body-weight);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        /* iOS Safari default — яркая синяя подсветка на тапе. Убираем,
           чтобы приложение выглядело нативно. Визуальный feedback
           обеспечивается button:active scale + анимациями открытия. */
        -webkit-tap-highlight-color: transparent;
        transition: background var(--med) var(--ease-out-quart),
                    color var(--med) var(--ease-out-quart);
      }

      button {
        background: none; border: 0; padding: 0; cursor: pointer;
        font: inherit; color: inherit;
        transition: color var(--fast) var(--ease-out-quart),
                    background var(--fast) var(--ease-out-quart),
                    border-color var(--fast) var(--ease-out-quart),
                    opacity var(--fast) var(--ease-out-quart),
                    transform var(--fast) var(--ease-out-quart);
      }

      /* Kill 300ms tap delay на iOS/Android; применяем только к interactive
         элементам — не хотим запрещать pinch-zoom/pan на контенте.
         !important нужен — многие кнопки в App.jsx делают `all: unset`,
         который сбрасывает touch-action обратно к auto. */
      button, a, [role="button"], input, textarea, select, label {
        touch-action: manipulation !important;
      }

      /* iOS zoom-on-focus: если input <16px, Safari насильно зумит viewport.
         На coarse-pointer устройствах поднимаем до 16, inline fontSize
         перекрывается !important (он задан в App.jsx для desktop-плотности). */
      @media (pointer: coarse) {
        input, textarea, select {
          font-size: 16px !important;
        }
      }

      @media (hover: hover) and (pointer: fine) {
        button:active:not(:disabled) { transform: scale(0.96); }
      }
      @media (pointer: coarse) {
        button:active:not(:disabled) { transform: scale(0.94); }
      }

      button:focus-visible {
        outline: 2px solid var(--pill-fg);
        outline-offset: 2px;
        border-radius: 3px;
      }

      input, textarea {
        background: transparent;
        color: inherit;
        caret-color: var(--accent);
      }
      input::placeholder, textarea::placeholder { color: var(--fg-4); }

      ::selection { background: var(--pill-bg); color: var(--fg); }

      /* Inline styles in App.jsx use `all: unset` to reset; we use !important
         here so class wins over inline reset without rippling through React. */
      .icon-btn {
        padding: 5px 7px !important;
        margin: -5px 0 !important;
        border-radius: 4px !important;
        line-height: 1 !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        cursor: pointer !important;
      }
      @media (hover: hover) {
        .icon-btn:hover { background: var(--surface) !important; color: var(--fg-2) !important; }
      }
      /* WCAG AA минимум 24×24, AAA — 44×44. Берём середину 36×36:
         комфортно для пальца, но не разрушает плотность YouTrack-style рядов. */
      @media (pointer: coarse) {
        .icon-btn {
          min-width: 36px !important;
          min-height: 36px !important;
          padding: 6px !important;
          margin: -4px -2px !important;
        }
      }

      /* Utility cluster wrapper — фон с blur, чтобы при скролле контент
         не "просвечивал" через полупрозрачные кнопки (cluster fixed на top-right,
         задачи/эпики скроллятся под ним). Backdrop-filter делает содержимое сзади
         размытым, кнопки остаются читаемыми. Purposeful glassmorphism — решает
         реальную проблему читаемости, не декоративно. */
      .util-cluster {
        background: var(--bg);
        border-radius: 20px;
        padding: 2px;
      }
      @supports ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .util-cluster {
          background: color-mix(in oklab, var(--bg) 72%, transparent);
          -webkit-backdrop-filter: blur(14px) saturate(1.4);
          backdrop-filter: blur(14px) saturate(1.4);
        }
      }

      /* Sticky section headers (Эпики, Спринты) — iOS Settings / Contacts style.
         При скролле header стикается к верху viewport'а под safe-area-inset-top
         (под notch на iPhone). Second header наступает и пушит первый — work out
         of the box потому что обе section'ы wrapped в <div style={SEC}>.
         Negative margin тянет фон на полную ширину контейнера (через padding),
         blur показывает размытое содержимое под header'ом. */
      .section-header {
        display: flex;
        align-items: baseline;
        gap: 4px;
        margin: 0 -14px 8px;
        padding: 6px 14px;
        position: sticky;
        top: env(safe-area-inset-top);
        z-index: 40;
        background: var(--bg);
      }
      @supports ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .section-header {
          background: color-mix(in oklab, var(--bg) 76%, transparent);
          -webkit-backdrop-filter: blur(12px) saturate(1.3);
          backdrop-filter: blur(12px) saturate(1.3);
        }
      }
      @media (min-width: 561px) {
        .section-header {
          margin: 0 -24px 8px;
          padding: 6px 24px;
        }
      }
      /* Scroll shadow — header "приподнимается" над контентом когда user
         скроллит и контент уезжает под header. iOS-like эффект глубины.
         Триггерится data-stuck через IntersectionObserver (sentinel в App.jsx).
         Transition плавный (180ms) чтобы shadow не "прыгал" при scroll events. */
      .section-header {
        transition: box-shadow 180ms var(--ease-out-quart);
      }
      .section-header[data-stuck="true"] {
        box-shadow: 0 4px 10px -6px oklch(0% 0 0 / 0.12);
      }

      /* Utility cluster (RU/EN, тема) — CSS-only hover чтобы не было sticky-эффекта на тач:
         JS onMouseEnter/Leave фейерится и при tap'е на мобиле, оставляя hover-стили. */
      .util-btn {
        all: unset;
        cursor: pointer;
        font-family: inherit;
        color: var(--fg-3);
        /* 0.65 — чуть выше чем raw-subtle (0.5), но всё ещё ambient.
           Даёт лучший contrast особенно в light theme поверх blurred backdrop. */
        opacity: 0.65;
        padding: 6px 8px;
        min-width: 32px; min-height: 32px;
        border-radius: 5px;
        display: inline-flex;
        align-items: center; justify-content: center;
        transition: opacity var(--fast) var(--ease-out-quart),
                    background var(--fast) var(--ease-out-quart);
      }
      @media (hover: hover) {
        .util-btn:hover { opacity: 1; background: var(--surface); }
      }
      .util-btn:focus-visible { opacity: 1; }

      /* Destructive action — hover подсвечивается danger-red,
         чтобы пользователь ощущал что это не обычный text-button. */
      @media (hover: hover) {
        .del-btn:hover { color: var(--danger) !important; }
      }

      /* Action cluster (icon-btn, act-btn) внутри row: на desktop полупрозрачны до
         hover'а по строке → снижают визуальный шум без ухудшения discoverability.
         На touch (hover: none) остаются полностью видимыми. */
      .row-actions, .act-btn {
        opacity: 0.35;
        transition: opacity var(--fast) var(--ease-out-quart);
      }
      @media (hover: hover) {
        .row:hover .row-actions,
        .row:hover .act-btn,
        .act-btn:focus-visible {
          opacity: 1;
        }
      }
      @media (hover: none) {
        .row-actions, .act-btn { opacity: 1; }
      }

      /* Mobile tap target: '+task' в sprint card по умолчанию ~50x18px —
         меньше WCAG minimum 24x24. Добавляем вертикальный паддинг чтобы
         палец попадал. Negative-margin компенсирует — не раздувает ряд. */
      @media (pointer: coarse) {
        .act-btn {
          padding: 8px 6px !important;
          margin: -8px -2px !important;
          min-height: 36px !important;
          display: inline-flex !important;
          align-items: center !important;
        }
      }

      /* Sheet action buttons (cancel/save/done в модалках): на мобиле делаем
         tap target побольше. padding снаружи + min-height 40 — комфортно
         для пальца, но не доминирует визуально. */
      @media (pointer: coarse) {
        .sheet-action {
          padding: 10px 14px !important;
          min-height: 40px !important;
          display: inline-flex !important;
          align-items: center !important;
        }
      }

      .pill-row {
        display: flex;
        gap: 6px;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
        -ms-overflow-style: none;
        scrollbar-width: none;
        margin: 0 -2px 28px;
        padding: 4px 2px;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
      }
      .pill-row::-webkit-scrollbar { display: none; }
      .pill-row > * { flex: 0 0 auto; scroll-snap-align: start; }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(8px) scale(0.99); }
        to   { opacity: 1; transform: translateY(0)   scale(1); }
      }
      @keyframes menu-in {
        from { opacity: 0; transform: translateY(-4px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }
      @keyframes row-in {
        from { opacity: 0; transform: translateY(-2px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes cb-pulse {
        0%   { transform: scale(0.85); }
        55%  { transform: scale(1.12); }
        100% { transform: scale(1); }
      }
      @media (hover: hover) {
        .circle:hover { transform: scale(1.15); border-color: var(--accent) !important; }
      }
      @keyframes sheet-up {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      @keyframes sheet-overlay {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .anim-sheet {
        /* iOS-style: smooth settle with soft spring (no overshoot, no opacity fade — только translate). */
        animation: sheet-up 320ms var(--ease-spring-soft);
        will-change: transform;
      }
      .anim-sheet-overlay {
        animation: sheet-overlay 220ms var(--ease-out-quart);
      }

      /* Vaul drawer: CSS @keyframes для enter/exit (transition не срабатывает
         потому что Vaul использует animation-name для open-state, а не transform
         property change). forwards fill-mode — держим конечное состояние после
         анимации чтобы избежать "прыжков" при переходе open↔closed. */
      @keyframes drawer-slide-in {
        from { transform: translate3d(0, 100%, 0); }
        to   { transform: translate3d(0, 0, 0); }
      }
      @keyframes drawer-slide-out {
        from { transform: translate3d(0, 0, 0); }
        to   { transform: translate3d(0, 100%, 0); }
      }
      @keyframes drawer-overlay-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes drawer-overlay-out {
        from { opacity: 1; }
        to   { opacity: 0; }
      }
      [data-vaul-drawer-direction="bottom"] {
        will-change: transform;
        /* Без forwards анимация "сбрасывает" transform на базовый в конце и
           драуэр прыгает. forwards держит translate3d(0,0,0) после open. */
      }
      [data-vaul-drawer-direction="bottom"][data-state="open"] {
        animation: drawer-slide-in 380ms var(--ease-spring-soft) forwards !important;
      }
      [data-vaul-drawer-direction="bottom"][data-state="closed"] {
        /* Closer slightly slower than open per iOS Human Interface: feel более
           "массивным" когда уезжает. 420ms matches drawer+overlay sync. */
        animation: drawer-slide-out 420ms var(--ease-spring-soft) forwards !important;
      }
      [data-vaul-overlay] {
        will-change: opacity;
      }
      [data-vaul-overlay][data-state="open"] {
        animation: drawer-overlay-in 280ms var(--ease-out-quart) forwards !important;
      }
      [data-vaul-overlay][data-state="closed"] {
        /* Sync с drawer close 420ms — иначе overlay исчезает раньше и видно
           "пульсацию" фона пока drawer ещё уезжает. */
        animation: drawer-overlay-out 420ms var(--ease-out-quart) forwards !important;
      }

      .anim-overlay { animation: fade-in var(--med) var(--ease-out-quart); }
      .anim-box {
        /* Desktop modal entrance — spring settles into final position, micro-overshoot. */
        animation: slide-up 340ms var(--ease-spring);
        will-change: transform, opacity;
      }
      .anim-menu {
        animation: menu-in 180ms var(--ease-spring-soft);
        transform-origin: top right;
      }
      .anim-row { animation: row-in 220ms var(--ease-spring-soft); }
      .cb-pulse { animation: cb-pulse 320ms var(--ease-spring); }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
        .anim-overlay, .anim-box, .anim-menu, .anim-row {
          animation: fade-in 160ms var(--ease-out-quart) !important;
        }
        /* Убираем backdrop scale — лишнее движение для пользователей с
           чувствительностью к motion. */
        .app-backdrop { transform: none !important; }
      }

      /* iOS-style sheet presentation: scrollable content scales down slightly
         когда drawer открывается → "карточка приподнялась над экраном".
         .app-content обернут ВНУТРИ app root но НЕ содержит UtilityCluster/
         Wordmark/Toast (они должны держать position:fixed относительно viewport,
         а не transformed ancestor). */
      @media (pointer: coarse) {
        .app-content {
          transition: transform 420ms var(--ease-spring-soft);
          transform-origin: top center;
        }
        .app-content.app-backdrop {
          transform: scale(0.96);
        }
      }

      /* Pressed-state scale для tap feedback. Применяем на .icon-btn, .cb-btn
         и .tap. 0.94 — лёгкий отклик, 100ms — почти мгновенно (iOS-like). */
      @media (pointer: coarse) {
        .tap, .icon-btn, .cb-btn {
          transition: transform 100ms var(--ease-out-quart), opacity 100ms;
          -webkit-tap-highlight-color: transparent;
        }
        .tap:active, .icon-btn:active, .cb-btn:active {
          transform: scale(0.94);
          opacity: 0.8;
        }

        /* Checkbox hit area: 20px визуальный круг, но тап-target 40×40.
           invisible ::before pseudo-element расширяет кликабельную зону
           без изменения визуального размера. WCAG AAA 44px compliance. */
        .circle {
          position: relative;
        }
        .circle::before {
          content: "";
          position: absolute;
          inset: -10px;
        }
      }

      /* Desktop: sheet-action также должны иметь минимальный tap/click target,
         иначе 8px padding слишком маленький для комфортного клика мышью. */
      @media (pointer: fine) {
        .sheet-action {
          min-height: 32px;
          display: inline-flex;
          align-items: center;
        }
      }
    </style>
  </head>
